<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle - dark teal/slate to contrast with DV's navy -->
  <circle cx="40" cy="40" r="40" fill="#0f4c5c"/>

  <!-- Database stack icon - representing EDWH (Enterprise Data Warehouse) -->
  <!-- Bottom cylinder layer -->
  <ellipse cx="40" cy="52" rx="14" ry="4" fill="none" stroke="#f97316" stroke-width="2"/>
  <line x1="26" y1="46" x2="26" y2="52" stroke="#f97316" stroke-width="2"/>
  <line x1="54" y1="46" x2="54" y2="52" stroke="#f97316" stroke-width="2"/>

  <!-- Middle cylinder layer -->
  <ellipse cx="40" cy="46" rx="14" ry="4" fill="#0f4c5c" stroke="#f97316" stroke-width="2"/>
  <line x1="26" y1="40" x2="26" y2="46" stroke="#f97316" stroke-width="2"/>
  <line x1="54" y1="40" x2="54" y2="46" stroke="#f97316" stroke-width="2"/>

  <!-- Top cylinder layer (cap) -->
  <ellipse cx="40" cy="40" rx="14" ry="4" fill="#0f4c5c" stroke="#f97316" stroke-width="2"/>
  <ellipse cx="40" cy="40" rx="14" ry="4" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-width="2"/>

  <!-- Small data flow dots -->
  <circle cx="33" cy="28" r="2" fill="#f97316" opacity="0.9"/>
  <circle cx="40" cy="25" r="2.5" fill="#f97316"/>
  <circle cx="47" cy="28" r="2" fill="#f97316" opacity="0.9"/>
  <!-- flow lines down to cylinder -->
  <line x1="33" y1="30" x2="35" y2="36" stroke="#f97316" stroke-width="1.5" stroke-dasharray="2 1.5"/>
  <line x1="40" y1="27.5" x2="40" y2="36" stroke="#f97316" stroke-width="1.5" stroke-dasharray="2 1.5"/>
  <line x1="47" y1="30" x2="45" y2="36" stroke="#f97316" stroke-width="1.5" stroke-dasharray="2 1.5"/>

  <!-- EDWH initials -->
  <text x="40" y="68"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="1">EDWH</text>
</svg>
