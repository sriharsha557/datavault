<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle - deep navy -->
  <circle cx="40" cy="40" r="40" fill="#1e1b4b"/>

  <!-- Central vault/hub - hexagon shape representing the "Vault" -->
  <polygon points="40,24 52,31 52,45 40,52 28,45 28,31" 
           fill="none" stroke="#2dd4bf" stroke-width="2.2"/>
  <polygon points="40,28 49,33 49,43 40,48 31,43 31,33" 
           fill="#2dd4bf" fill-opacity="0.12" stroke="#2dd4bf" stroke-width="1"/>

  <!-- Hub center dot -->
  <circle cx="40" cy="38" r="4" fill="#2dd4bf"/>

  <!-- Three satellite spokes radiating out — Data Vault hub pattern -->
  <!-- Spoke top-right -->
  <line x1="49" y1="31" x2="58" y2="20" stroke="#2dd4bf" stroke-width="1.8"/>
  <circle cx="61" cy="17" r="4.5" fill="none" stroke="#2dd4bf" stroke-width="2"/>
  <circle cx="61" cy="17" r="2" fill="#2dd4bf"/>

  <!-- Spoke bottom-right -->
  <line x1="52" y1="45" x2="62" y2="54" stroke="#2dd4bf" stroke-width="1.8"/>
  <circle cx="65" cy="57" r="4.5" fill="none" stroke="#2dd4bf" stroke-width="2"/>
  <circle cx="65" cy="57" r="2" fill="#2dd4bf"/>

  <!-- Spoke left -->
  <line x1="28" y1="38" x2="16" y2="38" stroke="#2dd4bf" stroke-width="1.8"/>
  <circle cx="13" cy="38" r="4.5" fill="none" stroke="#2dd4bf" stroke-width="2"/>
  <circle cx="13" cy="38" r="2" fill="#2dd4bf"/>

  <!-- DV initials inside the hexagon -->
  <text x="40" y="39"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="1">DV</text>
</svg>
